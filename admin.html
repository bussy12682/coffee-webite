<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Orders | Coffee House</title>
  <style>
    :root {
      color-scheme: light;
      --primary: #6f3610;
      --bg: #fffaf5;
      --panel: #ffffff;
      --text: #2f211d;
      --muted: #6f5f59;
      --border: #f0d7bb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    h1 { margin-top: 0; color: var(--primary); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .order-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      background: #fffdf9;
    }
    .meta { color: var(--muted); font-size: 0.95rem; margin-top: 6px; }
    .empty { color: var(--muted); margin-top: 12px; }
    button { padding: 10px 16px; border: 0; border-radius: 999px; background: var(--primary); color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="panel">
    <div style="display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between;">
      <div>
        <h1>Incoming Orders</h1>
        <div class="meta">Manage incoming orders, filter by status, and update order state.</div>
      </div>
      <div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center;">
        <button onclick="loadOrders()">Refresh</button>
        <button onclick="deleteAllOrders()">Delete All</button>
      </div>
    </div>

    <div style="margin:20px 0; display:flex; flex-wrap:wrap; gap:12px; align-items:center;">
      <input id="order-search" type="search" placeholder="Search by coffee, email, location, or ID" style="flex:1; min-width:220px; padding:10px 14px; border:1px solid var(--border); border-radius:12px;" />
      <select id="status-filter" style="padding:10px 14px; border:1px solid var(--border); border-radius:12px; min-width:180px;">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="paid">Paid</option>
      </select>
      <button onclick="loadOrders()">Apply Filter</button>
    </div>

    <div id="status" class="meta">Waiting for orders...</div>
    <div id="orders"></div>
  </div>

  <script>
    let refreshTimer;

    function buildSearchQuery() {
      const search = document.getElementById('order-search').value.trim();
      const status = document.getElementById('status-filter').value;
      const params = new URLSearchParams();

      if (search) params.set('search', search);
      if (status) params.set('status', status);

      return params.toString() ? `?${params.toString()}` : '';
    }

    async function loadOrders() {
      const container = document.getElementById('orders');
      const status = document.getElementById('status');

      if (window.location.protocol === 'file:') {
        container.innerHTML = '<p class="empty">Please open this page from the local server at <strong>http://localhost:3000/admin</strong>.</p>';
        status.textContent = 'Not loaded from server.';
        return;
      }

      container.innerHTML = '<p>Loading orders...</p>';

      try {
        const response = await fetch(`/api/orders${buildSearchQuery()}`);
        const data = await response.json();

        if (!data.success || !data.orders.length) {
          container.innerHTML = '<p class="empty">No orders yet.</p>';
          status.textContent = 'No orders found. Waiting for the next order...';
          return;
        }

        container.innerHTML = data.orders.map(order => `
          <div class="order-card">
            <div style="display:flex; justify-content:space-between; align-items:start; gap:12px; flex-wrap:wrap;">
              <div>
                <strong>${order.coffeeType} (${order.size})</strong>
                <div class="meta">Order ID: ${order.id}</div>
              </div>
              <div style="display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end;">
                <button class="delete-button" onclick="deleteOrder('${order.id}')">Delete</button>
                <button class="status-button" onclick="updateOrderStatus('${order.id}', 'paid')">Mark Paid</button>
              </div>
            </div>
            <div>Qty: ${order.quantity}</div>
            <div>Location: ${order.location}</div>
            <div>Email: ${order.email}</div>
            <div>Payment: ${order.payment}</div>
            <div>Reference: ${order.paymentReference || 'None'}</div>
            <div>Status: <strong>${order.status || 'pending'}</strong></div>
            <div>Note: ${order.note || 'None'}</div>
            <div class="meta">Created: ${new Date(order.createdAt).toLocaleString()}</div>
          </div>
        `).join('');

        status.textContent = `Showing ${data.orders.length} order${data.orders.length === 1 ? '' : 's'} • Updated ${new Date().toLocaleTimeString()}`;
      } catch (error) {
        container.innerHTML = '<p class="empty">Unable to load orders.</p>';
        status.textContent = 'Unable to load orders right now.';
      }
    }

    async function deleteOrder(orderId) {
      if (!confirm('Delete this order permanently?')) return;

      try {
        const response = await fetch(`/api/orders/${orderId}`, {
          method: 'DELETE'
        });
        const data = await response.json();

        if (!data.success) {
          alert(data.message || 'Unable to delete order.');
          return;
        }

        loadOrders();
      } catch (error) {
        alert('Unable to delete order.');
      }
    }

    async function deleteAllOrders() {
      if (!confirm('Delete all orders permanently?')) return;

      try {
        const response = await fetch('/api/orders', {
          method: 'DELETE'
        });
        const data = await response.json();

        if (!data.success) {
          alert(data.message || 'Unable to delete all orders.');
          return;
        }

        loadOrders();
      } catch (error) {
        alert('Unable to delete all orders.');
      }
    }

    async function updateOrderStatus(orderId, status) {
      try {
        const response = await fetch(`/api/orders/${orderId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        const data = await response.json();

        if (!data.success) {
          alert(data.message || 'Unable to update order status.');
          return;
        }

        loadOrders();
      } catch (error) {
        alert('Unable to update order status.');
      }
    }

    function startAutoRefresh() {
      if (refreshTimer) {
        clearInterval(refreshTimer);
      }

      refreshTimer = setInterval(loadOrders, 5000);
      window.addEventListener('focus', loadOrders);
    }

    loadOrders();
    startAutoRefresh();
  </script>
</body>
</html>
